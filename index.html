<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Вопрос</title>

<style>
body{
    text-align:center;
    font-family:Arial;
    margin-top:120px;
    background:#ffe6f0;
    overflow:hidden;
}

h1{
    font-size:42px;
}

button{
    font-size:20px;
    padding:12px 25px;
    margin:20px;
    cursor:pointer;
    border:none;
    border-radius:10px;
}

#yesBtn{
    background:#ff4d6d;
    color:white;
}

#noBtn{
    background:#888;
    color:white;
    position:absolute;
}

#hearts{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    pointer-events:none;
}

.heart{
    position:absolute;
    top:-20px;
    font-size:30px;
    animation:fall 3s linear forwards;
}

@keyframes fall{
    0%{
        transform:translateY(-50px) scale(0.5);
        opacity:1;
    }
    100%{
        transform:translateY(100vh) scale(1.5);
        opacity:0;
    }
}

#text{
    font-size:40px;
    color:#ff2e63;
    margin-top:40px;
    display:none;
    animation:pop 1s ease;
}

@keyframes pop{
    0%{transform:scale(0)}
    70%{transform:scale(1.2)}
    100%{transform:scale(1)}
}
</style>
</head>

<body>

<h1>Ты красивая? 💖</h1>

<button id="yesBtn" onclick="startLove()">Да</button>
<button id="noBtn" onclick="moveButton()">Нет</button>

<div id="text">Я так и знал 😍</div>
<div id="hearts"></div>

<script>

function moveButton(){
    let btn = document.getElementById("noBtn");
    let x = Math.random() * (window.innerWidth - 100);
    let y = Math.random() * (window.innerHeight - 50);

    btn.style.left = x + "px";
    btn.style.top = y + "px";
}

function startLove(){
    document.getElementById("text").style.display = "block";

    let container = document.getElementById("hearts");

    setInterval(() => {
        let heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = "💖";

        heart.style.left = Math.random() * window.innerWidth + "px";

        container.appendChild(heart);

        setTimeout(()=>{
            heart.remove();
        },3000);

    },200);
}

</script>

</body>
</html>
